name = "studyglobal"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[vars]
# ── Storage (provider-agnostic) ───────────────────────────────────────────────
# This is the ONLY value to change when switching CDN / storage provider.
# Set your actual public URL in the Cloudflare Pages dashboard:
#   e.g.  https://pub-xxxxxxxxxxxx.r2.dev
#         https://files.yourdomain.com
#         https://your-bucket.s3.amazonaws.com
STORAGE_BASE_URL = "https://pub-f7464438031f421b97023493fd4c6744.r2.dev"

# ── R2 bucket binding ─────────────────────────────────────────────────────────
# In Cloudflare Pages dashboard → Settings → Functions → R2 Bucket Bindings:
#   Variable name : STUDYGLOBAL_UPLOADS
#   R2 bucket     : <your bucket name>
#
# To swap to a different storage provider later, update functions/lib/storage.js
# (add a new class + update getStorageService). No other files need to change.
[[r2_buckets]]
binding     = "STUDYGLOBAL_UPLOADS"
bucket_name = "uploads"