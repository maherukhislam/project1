<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Globe base -->
  <circle cx="50" cy="50" r="45" fill="url(#globeGrad)"/>
  
  <!-- Water ripple effect -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#waterGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#waterGrad)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Continents (simplified) -->
  <ellipse cx="35" cy="35" rx="12" ry="8" fill="#22c55e" opacity="0.7" transform="rotate(-15 35 35)"/>
  <ellipse cx="60" cy="30" rx="15" ry="10" fill="#22c55e" opacity="0.7" transform="rotate(10 60 30)"/>
  <ellipse cx="45" cy="60" rx="14" ry="9" fill="#22c55e" opacity="0.7" transform="rotate(20 45 60)"/>
  <ellipse cx="70" cy="55" rx="8" ry="6" fill="#22c55e" opacity="0.7"/>
  
  <!-- Highlight -->
  <circle cx="35" cy="30" r="15" fill="white" opacity="0.3"/>
  
  <!-- Graduation cap accent -->
  <path d="M50 75 L35 68 L50 61 L65 68 Z" fill="#1e40af"/>
  <rect x="48" y="61" width="4" height="8" fill="#1e40af"/>
</svg>